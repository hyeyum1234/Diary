<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 심리 성장 기록장</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #ff6eb4;
  --purple: #b57bee;
  --yellow: #ffe066;
  --mint: #5ef0c8;
  --blue: #6ec6ff;
  --dark: #1a0a2e;
  --card: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nanum Gothic', sans-serif;
  background: var(--dark);
  color: #fff;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(181,123,238,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255,110,180,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(94,240,200,0.1) 0%, transparent 70%);
}

/* 잠금 화면 */
#lock-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px;
}
.lock-title {
  font-family: 'Gaegu', cursive; font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--mint));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 16px; text-align: center;
}
.lock-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 28px; padding: 40px 32px 32px;
  width: 300px; display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 8px 40px rgba(181,123,238,0.2);
}
.lock-icon { font-size: 44px; margin-bottom: 24px; }
.dots { display: flex; gap: 16px; margin-bottom: 32px; }
.dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3); background: transparent;
  transition: all .15s;
}
.dot.on { background: var(--pink); border-color: var(--pink); box-shadow: 0 0 10px var(--pink); }
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
.nk {
  background: rgba(255,255,255,0.08); border: 1px solid var(--border);
  border-radius: 14px; font-size: 22px; font-weight: 700; color: #fff;
  cursor: pointer; height: 62px; display: flex; align-items: center; justify-content: center;
  transition: all .12s; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  font-family: 'Nanum Gothic', sans-serif;
}
.nk:active { background: rgba(255,110,180,0.3); border-color: var(--pink); transform: scale(0.95); }
.nk.back { font-size: 18px; color: rgba(255,255,255,0.5); }
.nk.blank { visibility: hidden; pointer-events: none; }
.lock-err { margin-top: 14px; min-height: 18px; font-size: 13px; color: var(--pink); text-align: center; }

/* 메인 앱 */
#main-app { display: none; max-width: 820px; margin: 0 auto; padding: 20px; }
.top-bar {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.06); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 20px;
}
.top-bar h1 {
  font-family: 'Gaegu', cursive; font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.card {
  background: rgba(255,255,255,0.06); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 24px;
  padding: 24px; margin-bottom: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
}
.card h2 {
  font-family: 'Gaegu', cursive; font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, var(--mint), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; margin-top: 10px; }
textarea, input[type="text"], select {
  width: 100%; padding: 12px 14px; border: 1px solid var(--border);
  border-radius: 12px; font-family: 'Nanum Gothic', sans-serif; font-size: 15px;
  margin-bottom: 14px; background: rgba(255,255,255,0.07); color: #fff;
  outline: none; transition: border-color .2s;
}
textarea:focus, input[type="text"]:focus { border-color: var(--pink); }
textarea { min-height: 100px; resize: vertical; }
input[type="text"] { min-height: 44px; }
select { min-height: 44px; }
select option { background: #1a0a2e; color: #fff; }
textarea::placeholder, input::placeholder { color: rgba(255,255,255,0.3); }

.btn-pink {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff; border: none; padding: 12px 24px; border-radius: 12px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif;
  box-shadow: 0 4px 16px rgba(255,110,180,0.3);
  transition: all .2s;
}
.btn-pink:active { transform: scale(0.97); }
.btn-ghost {
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8);
  border: 1px solid var(--border); padding: 9px 16px; border-radius: 10px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif; transition: all .2s;
}
.btn-ghost:active { background: rgba(255,255,255,0.15); }
.btn-red {
  background: rgba(255,80,80,0.2); color: #ff8080; border: 1px solid rgba(255,80,80,0.3);
  padding: 5px 11px; border-radius: 8px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Nanum Gothic', sans-serif; transition: all .2s;
}
.btn-red:active { background: rgba(255,80,80,0.35); }
.btn-edit {
  background: rgba(94,240,200,0.15); color: var(--mint); border: 1px solid rgba(94,240,200,0.3);
  padding: 5px 11px; border-radius: 8px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Nanum Gothic', sans-serif; transition: all .2s;
}
.btn-edit:active { background: rgba(94,240,200,0.25); }

/* 이모지 피커 */
.emoji-section { margin-bottom: 14px; }
.emoji-selected-display {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  padding: 10px 14px; background: rgba(255,255,255,0.06);
  border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
  transition: border-color .2s;
}
.emoji-selected-display:hover { border-color: var(--pink); }
.emoji-selected-display .sel-emo { font-size: 28px; }
.emoji-selected-display .sel-label { font-size: 13px; color: rgba(255,255,255,0.6); }
.emoji-selected-display .sel-hint { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.3); }
.emoji-grid-wrap {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 16px;
  padding: 14px; display: none;
}
.emoji-grid-wrap.open { display: block; }
.emoji-category { margin-bottom: 12px; }
.emoji-cat-title { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
.emoji-row { display: flex; flex-wrap: wrap; gap: 6px; }
.emo-pick {
  font-size: 24px; width: 42px; height: 42px; display: flex; align-items: center;
  justify-content: center; border-radius: 10px; cursor: pointer;
  background: rgba(255,255,255,0.05); border: 1px solid transparent;
  transition: all .12s; -webkit-tap-highlight-color: transparent;
}
.emo-pick:hover { background: rgba(255,110,180,0.2); border-color: var(--pink); transform: scale(1.1); }
.emo-pick.active { background: rgba(255,110,180,0.3); border-color: var(--pink); }

/* 스티커 */
.sticker-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.sticker-pick {
  width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
  border-radius: 12px; cursor: pointer; border: 2px solid transparent;
  background: rgba(255,255,255,0.05); font-size: 30px;
  transition: all .12s; -webkit-tap-highlight-color: transparent;
}
.sticker-pick:hover { transform: scale(1.15); border-color: var(--purple); }
.sticker-pick.active { border-color: var(--pink); background: rgba(255,110,180,0.2); transform: scale(1.1); }

/* 일기 카드 */
.diary-entry {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px; margin-bottom: 12px;
  transition: border-color .2s;
}
.diary-entry:hover { border-color: rgba(255,255,255,0.25); }
.entry-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.entry-emo { font-size: 26px; }
.entry-sticker { font-size: 22px; margin-left: 2px; }
.etag {
  display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  background: linear-gradient(135deg, rgba(255,110,180,0.3), rgba(181,123,238,0.3));
  border: 1px solid rgba(255,110,180,0.4); color: var(--pink);
}
.edate { font-size: 11px; color: rgba(255,255,255,0.4); }
.entry-actions { margin-left: auto; display: flex; gap: 6px; }
.entry-text { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.85); }

/* 검색 */
.search-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.search-bar input { flex: 1; min-width: 150px; margin-bottom: 0; }
.search-bar select { width: auto; margin-bottom: 0; }

/* 달력 */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-nav button {
  background: rgba(255,255,255,0.08); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 16px; cursor: pointer; font-size: 14px; color: #fff;
  font-family: 'Nanum Gothic', sans-serif; transition: all .2s;
}
.cal-nav button:hover { background: rgba(255,110,180,0.2); border-color: var(--pink); }
.cal-title { font-family: 'Gaegu', cursive; font-size: 18px; color: var(--yellow); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.cal-day-label { text-align: center; font-size: 11px; color: rgba(255,255,255,0.4); padding: 4px 0; font-weight: 700; }
.cal-day-label.sun { color: var(--pink); }
.cal-day-label.sat { color: var(--blue); }
.cal-cell { text-align: center; padding: 3px 2px; min-height: 54px; border-radius: 10px; }
.cal-cell.has-entry { background: rgba(255,255,255,0.06); border: 1px solid var(--border); cursor: pointer; transition: all .2s; }
.cal-cell.has-entry:hover { background: rgba(255,110,180,0.15); border-color: var(--pink); }
.cal-num { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 2px; }
.cal-cell.has-entry .cal-num { color: rgba(255,255,255,0.7); font-weight: 700; }
.cal-emo { font-size: 20px; line-height: 1.3; }

/* AI */
.ai-box {
  background: rgba(110,198,255,0.08); border: 1px solid rgba(110,198,255,0.25);
  padding: 16px; border-radius: 14px; margin-top: 14px; line-height: 1.7;
  display: none; font-size: 14px; color: rgba(255,255,255,0.9);
}
.ai-error {
  background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3);
  padding: 14px; border-radius: 14px; margin-top: 14px; font-size: 13px; display: none;
  color: #ff8080;
}
.loading-msg { color: rgba(255,255,255,0.5); font-style: italic; display: none; margin-top: 10px; font-size: 14px; }

/* 모달 공통 */
.modal-wrap {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px); align-items: center; justify-content: center; z-index: 200;
}
.modal-wrap.open { display: flex; }

/* PIN 모달 */
.pw-card {
  background: rgba(26,10,46,0.95); border: 1px solid var(--border);
  border-radius: 24px; padding: 32px 28px 24px; width: 300px;
  display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 8px 40px rgba(181,123,238,0.3);
}
.pw-card h3 { font-family: 'Gaegu', cursive; font-size: 20px; color: var(--purple); margin-bottom: 14px; }
#m-status { font-size: 13px; color: rgba(255,255,255,0.5); min-height: 18px; margin: 6px 0 14px; text-align: center; }
.modal-foot { display: flex; justify-content: flex-end; width: 100%; margin-top: 14px; }

/* 상세/수정 모달 */
.detail-card, .edit-card {
  background: rgba(26,10,46,0.97); border: 1px solid var(--border);
  border-radius: 24px; padding: 28px; width: 380px; max-width: 92vw;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.detail-card h3 { font-family: 'Gaegu', cursive; font-size: 22px; margin-bottom: 6px; color: var(--pink); }
.detail-meta { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 14px; }
.detail-text { font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.9); white-space: pre-wrap; }
.detail-sticker { font-size: 32px; margin-bottom: 8px; }
.modal-close { margin-top: 20px; text-align: right; }
.edit-card h3 { font-family: 'Gaegu', cursive; font-size: 20px; color: var(--mint); margin-bottom: 14px; }
.edit-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

/* 저장 상태 */
#save-status { margin-top: 10px; font-size: 13px; display: none; }
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div id="lock-screen">
  <div class="lock-title">✦ 나만의 심리 성장 기록장 ✦</div>
  <div class="lock-card">
    <div class="lock-icon">&#128274;</div>
    <div class="dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="numpad">
      <button class="nk" data-n="1">1</button><button class="nk" data-n="2">2</button><button class="nk" data-n="3">3</button>
      <button class="nk" data-n="4">4</button><button class="nk" data-n="5">5</button><button class="nk" data-n="6">6</button>
      <button class="nk" data-n="7">7</button><button class="nk" data-n="8">8</button><button class="nk" data-n="9">9</button>
      <button class="nk blank"></button><button class="nk" data-n="0">0</button>
      <button class="nk back" id="lock-del">&#9003;</button>
    </div>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<!-- 비밀번호 변경 모달 -->
<div class="modal-wrap" id="pw-modal">
  <div class="pw-card">
    <h3>비밀번호 변경</h3>
    <div class="dots">
      <div class="dot" id="md0"></div><div class="dot" id="md1"></div>
      <div class="dot" id="md2"></div><div class="dot" id="md3"></div>
    </div>
    <div id="m-status">현재 비밀번호를 입력하세요</div>
    <div class="numpad">
      <button class="nk" data-m="1">1</button><button class="nk" data-m="2">2</button><button class="nk" data-m="3">3</button>
      <button class="nk" data-m="4">4</button><button class="nk" data-m="5">5</button><button class="nk" data-m="6">6</button>
      <button class="nk" data-m="7">7</button><button class="nk" data-m="8">8</button><button class="nk" data-m="9">9</button>
      <button class="nk blank"></button><button class="nk" data-m="0">0</button>
      <button class="nk back" id="modal-del">&#9003;</button>
    </div>
    <div class="modal-foot"><button class="btn-ghost" id="modal-cancel">취소</button></div>
  </div>
</div>

<!-- 일기 상세 모달 -->
<div class="modal-wrap" id="detail-modal">
  <div class="detail-card">
    <div class="detail-sticker" id="detail-sticker"></div>
    <h3 id="detail-emo"></h3>
    <div class="detail-meta" id="detail-date"></div>
    <div class="detail-text" id="detail-text"></div>
    <div class="modal-close"><button class="btn-ghost" id="detail-close-btn">닫기</button></div>
  </div>
</div>

<!-- 일기 수정 모달 -->
<div class="modal-wrap" id="edit-modal">
  <div class="edit-card">
    <h3>✏️ 기록 수정</h3>
    <label>감정 이모지</label>
    <div class="emoji-selected-display" id="edit-emo-display" onclick="toggleEditEmojiGrid()">
      <span class="sel-emo" id="edit-sel-emo">😊</span>
      <span class="sel-label" id="edit-sel-label">감정 선택</span>
      <span class="sel-hint">탭해서 변경</span>
    </div>
    <div class="emoji-grid-wrap" id="edit-emoji-grid"></div>
    <label>스티커</label>
    <div class="sticker-row" id="edit-sticker-row"></div>
    <label>내용</label>
    <textarea id="edit-content" style="min-height:120px;"></textarea>
    <input type="hidden" id="edit-id">
    <div class="edit-actions">
      <button class="btn-ghost" id="edit-cancel">취소</button>
      <button class="btn-pink" id="edit-save">저장하기</button>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="main-app">
  <div class="top-bar">
    <h1>✦ 나만의 심리 성장 기록장</h1>
    <button class="btn-ghost" id="open-pw-btn">🔑 비밀번호 변경</button>
  </div>

  <!-- 일기 쓰기 -->
  <div class="card">
    <h2>✍️ 오늘의 기록</h2>
    <label>감정 이모지를 선택하세요</label>
    <div class="emoji-section">
      <div class="emoji-selected-display" id="emo-display" onclick="toggleMainEmojiGrid()">
        <span class="sel-emo" id="main-sel-emo">✨</span>
        <span class="sel-label" id="main-sel-label">탭해서 감정 선택하기</span>
        <span class="sel-hint">▼</span>
      </div>
      <div class="emoji-grid-wrap" id="main-emoji-grid"></div>
    </div>
    <label>스티커를 골라보세요 (선택)</label>
    <div class="sticker-row" id="main-sticker-row"></div>
    <label>무슨 일이 있었나요?</label>
    <textarea id="diary-content" placeholder="오늘 있었던 일과 감정을 자유롭게 적어보세요..."></textarea>
    <button class="btn-pink" id="save-btn">기록 저장하기</button>
    <div id="save-status"></div>
  </div>

  <!-- 달력 -->
  <div class="card">
    <h2>📅 월별 감정 달력</h2>
    <div class="cal-nav">
      <button id="cal-prev">&#8249; 이전</button>
      <span class="cal-title" id="cal-title"></span>
      <button id="cal-next">다음 &#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- AI -->
  <div class="card">
    <h2>🤖 AI 심리 전문가에게 조언 구하기</h2>
    <p style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:14px;">일기를 쓰지 않아도 바로 조언을 받을 수 있어요.</p>
    <div id="gemini-key-section" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="font-size:13px;color:rgba(255,255,255,0.5);">🔑 Gemini API 키</span>
        <span id="key-status" style="font-size:12px;"></span>
      </div>
      <div style="display:flex;gap:8px;">
        <input type="password" id="gemini-key-input" placeholder="AIzaSy... 키를 입력하세요" style="margin-bottom:0;flex:1;">
        <button class="btn-pink" id="gemini-key-save" style="padding:10px 16px;font-size:13px;white-space:nowrap;">저장</button>
      </div>
      <p style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:8px;">키는 이 기기에만 저장되며 GitHub에 올라가지 않아요.</p>
    </div>
    <label>현재 고민을 적어주세요</label>
    <textarea id="ai-input" placeholder="예: 요즘 너무 지쳐있는데 어떻게 해야 할까요?"></textarea>
    <button class="btn-pink" id="ai-btn">조언 구하기</button>
    <div class="loading-msg" id="loading">✦ AI 전문가가 분석 중입니다...</div>
    <div class="ai-box" id="ai-response"></div>
    <div class="ai-error" id="ai-error"></div>
  </div>

  <!-- 보관함 -->
  <div class="card">
    <h2>📚 내 기록 보관함</h2>
    <div class="search-bar">
      <input type="text" id="search-text" placeholder="내용으로 검색...">
      <select id="search-emo">
        <option value="">전체</option>
      </select>
    </div>

// Supabase
function sbH(extra) {
  var h = { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Content-Type": "application/json" };
  if (extra) { for (var k in extra) h[k] = extra[k]; }
  return h;
}
function sbGet(table, query) {
  return fetch(SUPABASE_URL + "/rest/v1/" + table + "?" + (query || "order=created_at.desc"), { headers: sbH() })
    .then(function(r) { if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); } return r.json(); });
}
function sbPost(table, body) {
  return fetch(SUPABASE_URL + "/rest/v1/" + table, { method: "POST", headers: sbH({ "Prefer": "return=representation" }), body: JSON.stringify(body) })
    .then(function(r) { if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); } return r.json(); });
}
function sbPatch(table, query, body) {
  return fetch(SUPABASE_URL + "/rest/v1/" + table + "?" + query, { method: "PATCH", headers: sbH({ "Prefer": "return=minimal" }), body: JSON.stringify(body) })
    .then(function(r) { if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); } return true; });
}
function sbDelete(table, query) {
  return fetch(SUPABASE_URL + "/rest/v1/" + table + "?" + query, { method: "DELETE", headers: sbH() })
    .then(function(r) { if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); } return true; });
}
function getPin() {
  if (cachedPin) return Promise.resolve(cachedPin);
  return sbGet("app_config", "select=value&key=eq.pin")
    .then(function(rows) { cachedPin = (rows && rows.length > 0) ? rows[0].value : "0000"; return cachedPin; })
    .catch(function() { return "0000"; });
}
function savePin(p) { cachedPin = p; return sbPatch("app_config", "key=eq.pin", { value: p }); }

// 점
function setDots(prefix, n) {
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById(prefix + i);
    if (!el) continue;
    if (i < n) el.classList.add("on"); else el.classList.remove("on");
  }
}

document.getElementById("open-pw-btn").addEventListener("click", function() {

});
document.querySelectorAll("[data-m]").forEach(function(btn) {

          });
        } else if (mStep === "new") {
          mNew = entered; mStep = "confirm"; setMS("rgba(255,255,255,0.5)", "새 비밀번호를 다시 입력하세요");
        } else if (mStep === "confirm") {
          if (entered === mNew) {

// 이모지 그리드 렌더
function buildEmojiGrid(containerId, onSelect) {
  var container = document.getElementById(containerId);
  container.innerHTML = "";
  EMOJI_CATS.forEach(function(cat) {
    var sec = document.createElement("div"); sec.className = "emoji-category";
    var title = document.createElement("div"); title.className = "emoji-cat-title"; title.textContent = cat.title;
    var row = document.createElement("div"); row.className = "emoji-row";
    cat.list.forEach(function(emo) {
      var btn = document.createElement("button"); btn.className = "emo-pick"; btn.textContent = emo;
      btn.addEventListener("click", function() {
        container.querySelectorAll(".emo-pick").forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");
        onSelect(emo);
      });
      row.appendChild(btn);
    });
    sec.appendChild(title); sec.appendChild(row); container.appendChild(sec);
  });
}

// 스티커 그리드 렌더
function buildStickerRow(containerId, onSelect) {
  var container = document.getElementById(containerId);
  container.innerHTML = "";
  // 선택 안함 버튼
  var none = document.createElement("button");
  none.className = "sticker-pick active"; none.textContent = "✕";
  none.style.fontSize = "18px"; none.style.color = "rgba(255,255,255,0.4)";
  none.addEventListener("click", function() {
    container.querySelectorAll(".sticker-pick").forEach(function(b) { b.classList.remove("active"); });
    none.classList.add("active"); onSelect("");
  });
  container.appendChild(none);
  STICKERS.forEach(function(s) {
    var btn = document.createElement("button"); btn.className = "sticker-pick"; btn.textContent = s;
    btn.addEventListener("click", function() {
      container.querySelectorAll(".sticker-pick").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active"); onSelect(s);

    container.appendChild(btn);

}

buildStickerRow("main-sticker-row", function(s) { mainSelSticker = s; });

// 일기 저장
document.getElementById("save-btn").addEventListener("click", function() {
  var content = document.getElementById("diary-content").value.trim();
  if (!content) { alert("내용을 입력해주세요!"); return; }
  var now = new Date();
  var dateStr = now.toLocaleDateString("ko-KR");
  var ym = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
  var day = now.getDate();
  var statusEl = document.getElementById("save-status");

  sbPost("diaries", {
    emotion: mainSelEmo, emotion_emoji: mainSelEmo, sticker: mainSelSticker,
    content: content, date: dateStr, year_month: ym, day: day
  }).then(function() {
    document.getElementById("diary-content").value = "";

    mainSelEmo = "✨"; mainSelSticker = "";
    document.getElementById("main-sel-emo").textContent = "✨";
    document.getElementById("main-sel-label").textContent = "탭해서 감정 선택하기";
    statusEl.style.color = "#5ef0c8"; statusEl.textContent = "✓ 저장되었습니다!";
    setTimeout(function() { statusEl.style.display = "none"; }, 2000);
    loadDiaries(); renderCalendar();
  }).catch(function(e) { statusEl.style.color = "#ff8080"; statusEl.textContent = "저장 실패: " + e.message; });
});

// 일기 불러오기
function loadDiaries() {
  document.getElementById("diary-list").innerHTML = "<p style='color:rgba(255,255,255,0.3);'>불러오는 중...</p>";
  sbGet("diaries", "order=created_at.desc")
    .then(function(rows) { diaries = rows || []; renderDiaries(diaries); updateSearchEmoOptions(); })
    .catch(function(e) { diaries = []; document.getElementById("diary-list").innerHTML = "<p style='color:#ff8080;'>불러오기 실패: " + e.message + "</p>"; });
}

function updateSearchEmoOptions() {
  var sel = document.getElementById("search-emo");
  var used = {};
  diaries.forEach(function(d) { if (d.emotion) used[d.emotion] = true; });
  sel.innerHTML = "<option value=''>전체</option>";
  Object.keys(used).forEach(function(e) {
    var opt = document.createElement("option"); opt.value = e; opt.textContent = e; sel.appendChild(opt);
  });
}

// 삭제
function deleteDiary(id) {
  if (!confirm("이 기록을 삭제할까요?")) return;
  sbDelete("diaries", "id=eq." + id)
    .then(function() { loadDiaries(); renderCalendar(); })
    .catch(function(e) { alert("삭제 실패: " + e.message); });
}

// 수정 모달 열기
function openEdit(d) {
  document.getElementById("edit-id").value = d.id;
  document.getElementById("edit-content").value = d.content || "";
  editSelEmo = d.emotion_emoji || d.emotion || "😊";
  editSelSticker = d.sticker || "";
  document.getElementById("edit-sel-emo").textContent = editSelEmo;
  document.getElementById("edit-sel-label").textContent = editSelEmo;
  buildStickerRow("edit-sticker-row", function(s) { editSelSticker = s; });
  // 현재 스티커 활성화
  var stickerBtns = document.getElementById("edit-sticker-row").querySelectorAll(".sticker-pick");
  stickerBtns.forEach(function(btn) {
    if (btn.textContent === editSelSticker) { btn.classList.add("active"); }
    else if (!editSelSticker && btn.textContent === "✕") { btn.classList.add("active"); }
  });
  document.getElementById("edit-modal").classList.add("open");
}

document.getElementById("edit-cancel").addEventListener("click", function() {
  document.getElementById("edit-modal").classList.remove("open");
  document.getElementById("edit-emoji-grid").classList.remove("open");
});

document.getElementById("edit-save").addEventListener("click", function() {
  var id = document.getElementById("edit-id").value;
  var content = document.getElementById("edit-content").value.trim();
  if (!content) { alert("내용을 입력해주세요!"); return; }
  sbPatch("diaries", "id=eq." + id, { emotion: editSelEmo, emotion_emoji: editSelEmo, sticker: editSelSticker, content: content })
    .then(function() {
      document.getElementById("edit-modal").classList.remove("open");
      document.getElementById("edit-emoji-grid").classList.remove("open");
      loadDiaries(); renderCalendar();
    }).catch(function(e) { alert("수정 실패: " + e.message); });
});

// 검색
document.getElementById("search-text").addEventListener("input", filterDiaries);
document.getElementById("search-emo").addEventListener("change", filterDiaries);
function filterDiaries() {
  var kw = document.getElementById("search-text").value.trim().toLowerCase();
  var ef = document.getElementById("search-emo").value;
  renderDiaries(diaries.filter(function(d) {
    return (!kw || (d.content && d.content.toLowerCase().indexOf(kw) !== -1)) && (!ef || d.emotion === ef);
  }));
}

function renderDiaries(list) {
  var el = document.getElementById("diary-list");
  if (!list || !list.length) { el.innerHTML = "<p style='color:rgba(255,255,255,0.3);'>해당하는 기록이 없습니다.</p>"; return; }
  el.innerHTML = "";
  list.forEach(function(d) {
    var div = document.createElement("div"); div.className = "diary-entry";
    var sticker = d.sticker ? "<span class='entry-sticker'>" + d.sticker + "</span>" : "";
    div.innerHTML =
      "<div class='entry-top'>" +
        "<span class='entry-emo'>" + (d.emotion_emoji || d.emotion || "") + "</span>" +
        sticker +
        "<span class='etag'>" + (d.emotion || "") + "</span>" +
        "<span class='edate'>" + (d.date || "") + "</span>" +
        "<span class='entry-actions'>" +
          "<button class='btn-edit'>수정</button>" +
          "<button class='btn-red'>삭제</button>" +
        "</span>" +
      "</div>" +
      "<div class='entry-text'>" + (d.content || "") + "</div>";
    div.querySelector(".btn-edit").addEventListener("click", function() { openEdit(d); });
    div.querySelector(".btn-red").addEventListener("click", function() { deleteDiary(d.id); });
    el.appendChild(div);
  });
}

// 달력
document.getElementById("cal-prev").addEventListener("click", function() {
  calMonth--; if (calMonth < 1) { calMonth = 12; calYear--; } renderCalendar();
});
document.getElementById("cal-next").addEventListener("click", function() {
  calMonth++; if (calMonth > 12) { calMonth = 1; calYear++; } renderCalendar();
});
function renderCalendar() {
  var ym = calYear + "-" + String(calMonth).padStart(2, "0");
  document.getElementById("cal-title").textContent = calYear + "년 " + calMonth + "월";
  var grid = document.getElementById("cal-grid"); grid.innerHTML = "";
  sbGet("diaries", "select=day,emotion_emoji,emotion,sticker,content,date&year_month=eq." + ym + "&order=day.asc")
    .then(function(rows) {
      var map = {};
      (rows || []).forEach(function(r) { if (r.day && !map[r.day]) map[r.day] = r; });
      ["일","월","화","수","목","금","토"].forEach(function(d, i) {
        var lbl = document.createElement("div");
        lbl.className = "cal-day-label" + (i === 0 ? " sun" : i === 6 ? " sat" : "");
        lbl.textContent = d; grid.appendChild(lbl);
      });
      var firstDay = new Date(calYear, calMonth - 1, 1).getDay();
      var totalDays = new Date(calYear, calMonth, 0).getDate();
      for (var i = 0; i < firstDay; i++) {
        var blank = document.createElement("div"); blank.className = "cal-cell"; grid.appendChild(blank);
      }
      for (var d = 1; d <= totalDays; d++) {
        var cell = document.createElement("div");
        var entry = map[d];
        cell.className = "cal-cell" + (entry ? " has-entry" : "");
        cell.innerHTML = "<div class='cal-num'>" + d + "</div>" +
          (entry ? "<div class='cal-emo'>" + (entry.sticker || entry.emotion_emoji || entry.emotion) + "</div>" : "");
        if (entry) {
          (function(e) {
            cell.addEventListener("click", function() {
              document.getElementById("detail-sticker").textContent = e.sticker || "";
              document.getElementById("detail-emo").textContent = (e.emotion_emoji || e.emotion || "") + " " + (e.emotion || "");
              document.getElementById("detail-date").textContent = e.date;
              document.getElementById("detail-text").textContent = e.content;
              document.getElementById("detail-modal").classList.add("open");
            });
          })(entry);
        }
        grid.appendChild(cell);
      }
    }).catch(function() {
      grid.innerHTML = "<p style='color:#ff8080;font-size:13px;padding:10px;'>달력을 불러오지 못했습니다.</p>";
    });
}
document.getElementById("detail-close-btn").addEventListener("click", function() {
  document.getElementById("detail-modal").classList.remove("open");
});

// AI
document.getElementById("ai-btn").addEventListener("click", function() {
  var problem = document.getElementById("ai-input").value.trim();
  var respEl = document.getElementById("ai-response");
  var errEl = document.getElementById("ai-error");
  var loadEl = document.getElementById("loading");
  if (!problem) { alert("고민을 입력해주세요."); return; }
  var ctx = diaries.length > 0 ? "\n\n참고할 수 있는 최근 일기:\n" + JSON.stringify(diaries.slice(0, 5)) : "";
  var prompt = "당신은 공감 능력이 뛰어나면서도 상황을 객관적으로 분석하는 심리 전문가입니다.\n아래 고민에 대해 따뜻하고 실질적인 조언을 해주세요." + ctx + "\n\n[고민]:\n" + problem;
  respEl.style.display = "none"; errEl.style.display = "none"; loadEl.style.display = "block";
  fetch("https://generativelanguage.googleapis.com/v1beta/models/models/gemini-2.5-flash-lite:generateContent?key=" + GEMINI_KEY, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  }).then(function(r) { return r.json(); })
  .then(function(data) {
    loadEl.style.display = "none";
    if (data.error) { errEl.innerHTML = "API 오류 (" + data.error.code + "): " + data.error.message; errEl.style.display = "block"; return; }
    var text = "";
    try { text = data.candidates[0].content.parts[0].text; }
    catch(e) { text = "응답을 파싱하지 못했습니다."; }
    respEl.innerHTML = "<strong>✦ AI 심리 전문가의 조언:</strong><br><br>" + text.replace(/\n/g, "<br>");
    respEl.style.display = "block";
  }).catch(function(e) {
    loadEl.style.display = "none";
    errEl.innerHTML = "네트워크 오류: " + e.message; errEl.style.display = "block";
  });
});

})();

showLock();
