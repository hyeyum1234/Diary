<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 심리 성장 기록장</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; background: #f9fbed; color: #333; min-height: 100vh; }

#lock-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.lock-card {
  background: #fff; border-radius: 20px; padding: 44px 36px 36px;
  width: 290px; display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 6px 28px rgba(0,0,0,0.10);
}
.lock-icon { font-size: 46px; margin-bottom: 26px; }
.dots { display: flex; gap: 16px; margin-bottom: 30px; }
.dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid #799a3d; background: transparent; transition: background .12s; }
.dot.on { background: #799a3d; }
.numpad { display: grid; grid-template-columns: repeat(3, 80px); grid-template-rows: repeat(4, 64px); gap: 8px; }
.nk {
  background: #f2f5e8; border: none; border-radius: 10px;
  font-size: 22px; font-weight: 700; color: #333; cursor: pointer;
  width: 80px; height: 64px; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.nk:active { background: #c8d890; }
.nk.back { font-size: 18px; color: #777; background: #eee; }
.nk.blank { visibility: hidden; pointer-events: none; }
.err { margin-top: 16px; min-height: 18px; font-size: 13px; color: #c0392b; text-align: center; }

#main-app { display: none; max-width: 800px; margin: 0 auto; padding: 20px; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.top-bar h1 { font-size: 22px; color: #4a5d23; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 3px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
.card h2 { color: #4a5d23; margin-bottom: 14px; font-size: 18px; }
label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; margin-top: 8px; }
textarea, input[type="text"], select {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
  font-family: inherit; font-size: 15px; margin-bottom: 14px; background: #fff; color: #333;
}
textarea { min-height: 100px; resize: vertical; }
input[type="text"] { min-height: 42px; }
select { min-height: 42px; }
.btn-green { background: #799a3d; color: #fff; border: none; padding: 12px 22px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-green:active { background: #5c752d; }
.btn-gray { background: #aaa; color: #fff; border: none; padding: 9px 15px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-gray:active { background: #888; }

.emotion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
.emo-btn {
  padding: 14px 8px; border: 2px solid #ddd; border-radius: 10px;
  background: #fff; cursor: pointer; font-size: 24px; text-align: center; transition: all .15s;
}
.emo-btn span { display: block; font-size: 12px; color: #666; margin-top: 5px; }
.emo-btn.selected { border-color: #799a3d; background: #f0f5e0; }

.diary-entry { border-left: 4px solid #799a3d; background: #fdfdfd; padding: 14px; margin-bottom: 10px; border-radius: 4px; }
.entry-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.etag { display: inline-block; background: #e8f0d1; color: #4a5d23; border-radius: 12px; padding: 3px 9px; font-size: 12px; font-weight: 700; }
.edate { font-size: 12px; color: #999; }
.entry-text { font-size: 15px; line-height: 1.6; }

.search-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.search-bar input { flex: 1; min-width: 150px; margin-bottom: 0; }
.search-bar select { width: auto; margin-bottom: 0; flex-shrink: 0; }

.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-nav button { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 14px; color: #555; }
.cal-nav button:hover { background: #f0f5e0; }
.cal-title { font-size: 16px; font-weight: 700; color: #4a5d23; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day-label { text-align: center; font-size: 12px; color: #999; padding: 4px 0; font-weight: 700; }
.cal-day-label.sun { color: #e74c3c; }
.cal-day-label.sat { color: #3498db; }
.cal-cell { text-align: center; padding: 4px 2px; min-height: 52px; border-radius: 8px; }
.cal-cell.has-entry { background: #f8fbe8; cursor: pointer; }
.cal-cell.has-entry:hover { background: #e8f0d1; }
.cal-num { font-size: 11px; color: #ccc; margin-bottom: 2px; }
.cal-cell.has-entry .cal-num { color: #4a5d23; font-weight: 700; }
.cal-emo { font-size: 22px; line-height: 1.2; }

.ai-box { background: #f0f7ff; border-left: 4px solid #4a90e2; padding: 14px; border-radius: 4px; margin-top: 14px; white-space: pre-wrap; line-height: 1.6; display: none; }
.loading-msg { color: #888; font-style: italic; display: none; margin-top: 10px; font-size: 14px; }

#pw-modal, #detail-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  align-items: center; justify-content: center; z-index: 100;
}
.modal-card {
  background: #fff; border-radius: 18px; padding: 32px 28px 24px; width: 290px;
  display: flex; flex-direction: column; align-items: center; box-shadow: 0 6px 28px rgba(0,0,0,0.16);
}
.modal-card h3 { color: #4a5d23; margin-bottom: 14px; font-size: 17px; }
#m-status { font-size: 13px; color: #555; min-height: 18px; margin: 6px 0 14px; text-align: center; }
.modal-foot { display: flex; justify-content: flex-end; width: 100%; margin-top: 14px; }
.detail-card {
  background: #fff; border-radius: 18px; padding: 28px; width: 340px; max-width: 90vw;
  box-shadow: 0 6px 28px rgba(0,0,0,0.16);
}
.detail-card h3 { color: #4a5d23; margin-bottom: 8px; font-size: 20px; }
.detail-meta { font-size: 13px; color: #999; margin-bottom: 14px; }
.detail-text { font-size: 15px; line-height: 1.7; color: #333; white-space: pre-wrap; }
.detail-close { margin-top: 18px; text-align: right; }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">&#128274;</div>
    <div class="dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div class="numpad">
      <button class="nk" data-n="1">1</button>
      <button class="nk" data-n="2">2</button>
      <button class="nk" data-n="3">3</button>
      <button class="nk" data-n="4">4</button>
      <button class="nk" data-n="5">5</button>
      <button class="nk" data-n="6">6</button>
      <button class="nk" data-n="7">7</button>
      <button class="nk" data-n="8">8</button>
      <button class="nk" data-n="9">9</button>
      <button class="nk blank"></button>
      <button class="nk" data-n="0">0</button>
      <button class="nk back" id="lock-del">&#9003;</button>
    </div>
    <div class="err" id="lock-err"></div>
  </div>
</div>

<div id="pw-modal">
  <div class="modal-card">
    <h3>비밀번호 변경</h3>
    <div class="dots">
      <div class="dot" id="md0"></div>
      <div class="dot" id="md1"></div>
      <div class="dot" id="md2"></div>
      <div class="dot" id="md3"></div>
    </div>
    <div id="m-status">현재 비밀번호를 입력하세요</div>
    <div class="numpad">
      <button class="nk" data-m="1">1</button>
      <button class="nk" data-m="2">2</button>
      <button class="nk" data-m="3">3</button>
      <button class="nk" data-m="4">4</button>
      <button class="nk" data-m="5">5</button>
      <button class="nk" data-m="6">6</button>
      <button class="nk" data-m="7">7</button>
      <button class="nk" data-m="8">8</button>
      <button class="nk" data-m="9">9</button>
      <button class="nk blank"></button>
      <button class="nk" data-m="0">0</button>
      <button class="nk back" id="modal-del">&#9003;</button>
    </div>
    <div class="modal-foot">
      <button class="btn-gray" id="modal-cancel">취소</button>
    </div>
  </div>
</div>

<div id="detail-modal">
  <div class="detail-card">
    <h3 id="detail-emo"></h3>
    <div class="detail-meta" id="detail-date"></div>
    <div class="detail-text" id="detail-text"></div>
    <div class="detail-close">
      <button class="btn-gray" id="detail-close-btn">닫기</button>
    </div>
  </div>
</div>

<div id="main-app">
  <div class="top-bar">
    <h1>&#127807; 나만의 심리 성장 기록장</h1>
    <button class="btn-gray" id="open-pw-btn">비밀번호 변경</button>
  </div>

  <div class="card">
    <h2>&#9997; 오늘의 기록</h2>
    <label>오늘의 감정을 선택하세요</label>
    <div class="emotion-grid">
      <button class="emo-btn" data-emo="&#128522;" data-label="좋았던 일">&#128522;<span>좋았던 일</span></button>
      <button class="emo-btn" data-emo="&#128546;" data-label="슬펐던 일">&#128546;<span>슬펐던 일</span></button>
      <button class="emo-btn" data-emo="&#128544;" data-label="자존심 상했던 일">&#128544;<span>자존심 상했던 일</span></button>
      <button class="emo-btn" data-emo="&#128161;" data-label="깨달음을 얻은 일">&#128161;<span>깨달음을 얻은 일</span></button>
    </div>
    <label>무슨 일이 있었나요?</label>
    <textarea id="diary-content" placeholder="오늘 있었던 일과 감정을 자유롭게 적어보세요..."></textarea>
    <button class="btn-green" id="save-btn">기록 저장하기</button>
    <div id="save-status" style="margin-top:10px;font-size:13px;color:#799a3d;display:none;"></div>
  </div>

  <div class="card">
    <h2>&#128197; 월별 감정 달력</h2>
    <div class="cal-nav">
      <button id="cal-prev">&#8249; 이전</button>
      <span class="cal-title" id="cal-title"></span>
      <button id="cal-next">다음 &#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="card">
    <h2>&#129504; AI 심리 전문가에게 조언 구하기</h2>
    <p style="font-size:13px;color:#888;margin-bottom:12px;">일기를 쓰지 않아도 바로 조언을 받을 수 있어요.</p>
    <label>현재 고민을 적어주세요</label>
    <textarea id="ai-input" placeholder="예: 요즘 너무 지쳐있는데 어떻게 해야 할까요?"></textarea>
    <button class="btn-green" id="ai-btn">조언 구하기</button>
    <div class="loading-msg" id="loading">AI 전문가가 분석 중입니다...</div>
    <div class="ai-box" id="ai-response"></div>
  </div>

  <div class="card">
    <h2>&#128218; 내 기록 보관함</h2>
    <div class="search-bar">
      <input type="text" id="search-text" placeholder="내용으로 검색...">
      <select id="search-emo">
        <option value="">전체 감정</option>
        <option value="좋았던 일">좋았던 일</option>
        <option value="슬펐던 일">슬펐던 일</option>
        <option value="자존심 상했던 일">자존심 상했던 일</option>
        <option value="깨달음을 얻은 일">깨달음을 얻은 일</option>
      </select>
    </div>
    <div id="diary-list"><p style="color:#bbb;">불러오는 중...</p></div>
  </div>
</div>

<script type="text/javascript">
var SUPABASE_URL = "https://hqrxduhqkxjlndhexxau.supabase.co";
var SUPABASE_KEY = "sb_publishable_d2wQl4H8JzNrUVldLM4Xvw_lmVvCeWy";
var GEMINI_KEY   = "AIzaSyBO4WSVuqQ83IYu9dHXf2t1_LuRSSXZvm0";

function sbH(extra) {
  var h = { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Content-Type": "application/json" };
  if (extra) { for (var k in extra) h[k] = extra[k]; }
  return h;
}
function sbGet(table, query) {
  return fetch(SUPABASE_URL + "/rest/v1/" + table + "?" + (query || "order=created_at.desc"), { method: "GET", headers: sbH() })
    .then(function(r) { if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); } return r.json(); });
}
function sbPost(table, body) {
  return fetch(SUPABASE_URL + "/rest/v1/" + table, { method: "POST", headers: sbH({ "Prefer": "return=representation" }), body: JSON.stringify(body) })
    .then(function(r) { if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); } return r.json(); });
}
function sbPatch(table, query, body) {
  return fetch(SUPABASE_URL + "/rest/v1/" + table + "?" + query, { method: "PATCH", headers: sbH({ "Prefer": "return=minimal" }), body: JSON.stringify(body) });
}

var cachedPin = null;
var diaries = [];
var selEmo = "";
var selEmoLabel = "";
var calYear = new Date().getFullYear();
var calMonth = new Date().getMonth() + 1;

function getPin() {
  if (cachedPin) return Promise.resolve(cachedPin);
  return sbGet("app_config", "select=value&key=eq.pin")
    .then(function(rows) { cachedPin = (rows && rows.length > 0) ? rows[0].value : "0000"; return cachedPin; })
    .catch(function() { return "0000"; });
}
function savePin(p) { cachedPin = p; return sbPatch("app_config", "key=eq.pin", { value: p }); }

function setDots(prefix, n) {
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById(prefix + i);
    if (!el) continue;
    if (i < n) el.classList.add("on"); else el.classList.remove("on");
  }
}

function showLock() {
  document.getElementById("lock-screen").style.display = "flex";
  document.getElementById("main-app").style.display = "none";
  lBuf = ""; lLock = false;
  setDots("d", 0);
  document.getElementById("lock-err").textContent = "";
}
function showMain() {
  document.getElementById("lock-screen").style.display = "none";
  document.getElementById("main-app").style.display = "block";
  loadDiaries();
  renderCalendar();
}

var lBuf = "", lLock = false;
document.querySelectorAll("[data-n]").forEach(function(btn) {
  btn.addEventListener("click", function() {
    if (lLock || lBuf.length >= 4) return;
    lBuf += this.getAttribute("data-n");
    setDots("d", lBuf.length);
    document.getElementById("lock-err").textContent = "";
    if (lBuf.length === 4) {
      lLock = true;
      var entered = lBuf; lBuf = "";
      setTimeout(function() {
        setDots("d", 0);
        getPin().then(function(pin) {
          if (entered === pin) { lLock = false; showMain(); }
          else { document.getElementById("lock-err").textContent = "비밀번호가 맞지 않습니다."; lLock = false; }
        });
      }, 160);
    }
  });
});
document.getElementById("lock-del").addEventListener("click", function() {
  if (lLock) return;
  lBuf = lBuf.slice(0, -1); setDots("d", lBuf.length);
  document.getElementById("lock-err").textContent = "";
});

var mStep = "current", mBuf = "", mLock = false, mNew = "";
function setMS(c, t) { var el = document.getElementById("m-status"); el.style.color = c; el.textContent = t; }
document.getElementById("open-pw-btn").addEventListener("click", function() {
  mStep = "current"; mBuf = ""; mNew = ""; mLock = false;
  setDots("md", 0); setMS("#555", "현재 비밀번호를 입력하세요");
  document.getElementById("pw-modal").style.display = "flex";
});
document.getElementById("modal-cancel").addEventListener("click", function() {
  document.getElementById("pw-modal").style.display = "none";
});
document.querySelectorAll("[data-m]").forEach(function(btn) {
  btn.addEventListener("click", function() {
    if (mLock || mBuf.length >= 4) return;
    mBuf += this.getAttribute("data-m"); setDots("md", mBuf.length);
    if (mBuf.length === 4) {
      mLock = true; var entered = mBuf; mBuf = "";
      setTimeout(function() {
        setDots("md", 0); mLock = false;
        if (mStep === "current") {
          getPin().then(function(pin) {
            if (entered === pin) { mStep = "new"; setMS("#555", "새 비밀번호를 입력하세요"); }
            else { setMS("#c0392b", "현재 비밀번호가 틀렸습니다"); }
          });
        } else if (mStep === "new") {
          mNew = entered; mStep = "confirm"; setMS("#555", "새 비밀번호를 다시 입력하세요");
        } else if (mStep === "confirm") {
          if (entered === mNew) {
            savePin(mNew).then(function() {
              setMS("#27ae60", "비밀번호가 변경되었습니다");
              setTimeout(function() { document.getElementById("pw-modal").style.display = "none"; }, 1000);
            });
          } else { setMS("#c0392b", "일치하지 않습니다. 새 비밀번호부터 다시 입력하세요"); mStep = "new"; mNew = ""; }
        }
      }, 160);
    }
  });
});
document.getElementById("modal-del").addEventListener("click", function() {
  if (mLock) return; mBuf = mBuf.slice(0, -1); setDots("md", mBuf.length);
});

document.querySelectorAll(".emo-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".emo-btn").forEach(function(b) { b.classList.remove("selected"); });
    this.classList.add("selected");
    selEmo = this.getAttribute("data-emo");
    selEmoLabel = this.getAttribute("data-label");
  });
});

document.getElementById("save-btn").addEventListener("click", function() {
  if (!selEmo) { alert("감정을 선택해주세요!"); return; }
  var content = document.getElementById("diary-content").value.trim();
  if (!content) { alert("내용을 입력해주세요!"); return; }
  var now = new Date();
  var dateStr = now.toLocaleDateString("ko-KR");
  var ym = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
  var day = now.getDate();
  var statusEl = document.getElementById("save-status");
  statusEl.style.color = "#799a3d";
  statusEl.textContent = "저장 중...";
  statusEl.style.display = "block";
  sbPost("diaries", { emotion: selEmoLabel, emotion_emoji: selEmo, content: content, date: dateStr, year_month: ym, day: day })
    .then(function() {
      document.getElementById("diary-content").value = "";
      document.querySelectorAll(".emo-btn").forEach(function(b) { b.classList.remove("selected"); });
      selEmo = ""; selEmoLabel = "";
      statusEl.textContent = "저장되었습니다!";
      setTimeout(function() { statusEl.style.display = "none"; }, 2000);
      loadDiaries(); renderCalendar();
    }).catch(function(e) {
      statusEl.style.color = "#c0392b";
      statusEl.textContent = "저장 실패: " + e.message;
    });
});

function loadDiaries() {
  document.getElementById("diary-list").innerHTML = "<p style='color:#bbb;'>불러오는 중...</p>";
  sbGet("diaries", "order=created_at.desc")
    .then(function(rows) { diaries = rows || []; renderDiaries(diaries); })
    .catch(function(e) { diaries = []; document.getElementById("diary-list").innerHTML = "<p style='color:#c0392b;'>불러오기 실패: " + e.message + "</p>"; });
}

document.getElementById("search-text").addEventListener("input", filterDiaries);
document.getElementById("search-emo").addEventListener("change", filterDiaries);
function filterDiaries() {
  var kw = document.getElementById("search-text").value.trim().toLowerCase();
  var ef = document.getElementById("search-emo").value;
  renderDiaries(diaries.filter(function(d) {
    return (!kw || (d.content && d.content.toLowerCase().indexOf(kw) !== -1)) && (!ef || d.emotion === ef);
  }));
}
function renderDiaries(list) {
  var el = document.getElementById("diary-list");
  if (!list || !list.length) { el.innerHTML = "<p style='color:#bbb;'>해당하는 기록이 없습니다.</p>"; return; }
  el.innerHTML = "";
  list.forEach(function(d) {
    var div = document.createElement("div");
    div.className = "diary-entry";
    div.innerHTML =
      "<div class='entry-top'><span style='font-size:22px;'>" + (d.emotion_emoji || "") + "</span>" +
      "<span class='etag'>" + (d.emotion || "") + "</span><span class='edate'>" + (d.date || "") + "</span></div>" +
      "<div class='entry-text'>" + (d.content || "") + "</div>";
    el.appendChild(div);
  });
}

document.getElementById("cal-prev").addEventListener("click", function() {
  calMonth--; if (calMonth < 1) { calMonth = 12; calYear--; } renderCalendar();
});
document.getElementById("cal-next").addEventListener("click", function() {
  calMonth++; if (calMonth > 12) { calMonth = 1; calYear++; } renderCalendar();
});
function renderCalendar() {
  var ym = calYear + "-" + String(calMonth).padStart(2, "0");
  document.getElementById("cal-title").textContent = calYear + "년 " + calMonth + "월";
  var grid = document.getElementById("cal-grid");
  grid.innerHTML = "";
  sbGet("diaries", "select=day,emotion_emoji,emotion,content,date&year_month=eq." + ym + "&order=day.asc")
    .then(function(rows) {
      var map = {};
      (rows || []).forEach(function(r) { if (r.day && !map[r.day]) map[r.day] = r; });
      ["일","월","화","수","목","금","토"].forEach(function(d, i) {
        var lbl = document.createElement("div");
        lbl.className = "cal-day-label" + (i === 0 ? " sun" : i === 6 ? " sat" : "");
        lbl.textContent = d; grid.appendChild(lbl);
      });
      var firstDay = new Date(calYear, calMonth - 1, 1).getDay();
      var totalDays = new Date(calYear, calMonth, 0).getDate();
      for (var i = 0; i < firstDay; i++) {
        var blank = document.createElement("div"); blank.className = "cal-cell"; grid.appendChild(blank);
      }
      for (var d = 1; d <= totalDays; d++) {
        var cell = document.createElement("div");
        var entry = map[d];
        cell.className = "cal-cell" + (entry ? " has-entry" : "");
        cell.innerHTML = "<div class='cal-num'>" + d + "</div>" + (entry ? "<div class='cal-emo'>" + entry.emotion_emoji + "</div>" : "");
        if (entry) {
          (function(e) {
            cell.addEventListener("click", function() {
              document.getElementById("detail-emo").textContent = e.emotion_emoji + " " + e.emotion;
              document.getElementById("detail-date").textContent = e.date;
              document.getElementById("detail-text").textContent = e.content;
              document.getElementById("detail-modal").style.display = "flex";
            });
          })(entry);
        }
        grid.appendChild(cell);
      }
    }).catch(function() {
      grid.innerHTML = "<p style='color:#c0392b;font-size:13px;padding:10px;'>달력을 불러오지 못했습니다.</p>";
    });
}
document.getElementById("detail-close-btn").addEventListener("click", function() {
  document.getElementById("detail-modal").style.display = "none";
});

// =============================================
// AI 조언 - Gemini API 직접 호출
// =============================================
document.getElementById("ai-btn").addEventListener("click", function() {
  var problem = document.getElementById("ai-input").value.trim();
  var respEl = document.getElementById("ai-response");
  var loadEl = document.getElementById("loading");

  if (!problem) { alert("고민을 입력해주세요."); return; }

  var ctx = "";
  if (diaries && diaries.length > 0) {
    ctx = "\n\n참고할 수 있는 최근 일기:\n" + JSON.stringify(diaries.slice(0, 5));
  }
  var prompt = "당신은 공감 능력이 뛰어나면서도 상황을 객관적으로 분석하는 심리 전문가입니다.\n" +
    "아래 고민에 대해 따뜻하고 실질적인 조언을 해주세요." + ctx + "\n\n[고민]:\n" + problem;

  respEl.style.display = "none";
  respEl.innerHTML = "";
  loadEl.style.display = "block";

  var geminiUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI_KEY;

  fetch(geminiUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var text = "";
    try {
      text = data.candidates[0].content.parts[0].text;
    } catch(e) {
      if (data.error) {
        text = "API 오류: " + data.error.message;
      } else {
        text = "응답을 받지 못했습니다.";
      }
    }
    respEl.innerHTML = "<strong>AI 심리 전문가의 조언:</strong><br><br>" + text.replace(/\n/g, "<br>");
    respEl.style.display = "block";
  })
  .catch(function(e) {
    respEl.innerHTML = "오류: " + e.message;
    respEl.style.display = "block";
  })
  .finally(function() { loadEl.style.display = "none"; });
});

showLock();
</script>
